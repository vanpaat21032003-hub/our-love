<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Untuk Meichelia ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;

background:linear-gradient(-45deg,#ff9ec4,#ffc1da,#ffd6e7,#ffeef5);
background-size:400% 400%;
animation:bg 12s ease infinite;

}

@keyframes bg{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

.card{

width:90%;
max-width:420px;

background:white;

padding:40px;

border-radius:25px;

text-align:center;

box-shadow:0 15px 35px rgba(0,0,0,.15);

animation:zoom .7s;

}

@keyframes zoom{

from{

opacity:0;
transform:scale(.8);

}

to{

opacity:1;
transform:scale(1);

}

}

h1{

color:#ff3f7f;
margin-bottom:20px;

}

p{

font-size:18px;
line-height:1.8;
color:#444;

}

button{

margin-top:30px;

padding:15px 35px;

border:none;

border-radius:50px;

background:#ff3f7f;

color:white;

font-size:18px;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.08);

box-shadow:0 0 20px rgba(255,63,127,.5);

}

.heart{

position:absolute;

font-size:24px;

animation:fall linear forwards;

pointer-events:none;

}

@keyframes fall{

0%{

transform:translateY(-50px);

opacity:1;

}

100%{

transform:translateY(110vh);

opacity:0;

}

}

</style>

</head>

<body>

<div class="card">

<h1 id="judul">❤️ Hai Meichelia ❤️</h1>

<p id="isi">

kt ada sesuatu...

</p>

<button id="btn" onclick="step1()">

Buka ❤️

</button>

</div>

<script>

function step1(){

document.getElementById("judul").innerHTML="💌 Untukmu";

document.getElementById("isi").innerHTML=`
Makasih neh cantiik so meluangkan waktu so buka ini link😊.<br><br>

Masih ada pesan lehh.
`;

document.getElementById("btn").innerHTML="Lanjutkan 🌸";

document.getElementById("btn").onclick=step2;

}

function step2(){

document.getElementById("judul").innerHTML="❤️ Hai Meichelia ❤️";

document.getElementById("isi").innerHTML=`
Sela Jangan Lupa Senyum nehh Tiap Hari.<br><br>

Kalo Ada Masalah Langsung Cerita Nehh Sayang
Se Kurang Itu Ovt.<br><br>

🤗 Sayaang Duluu Dang ❤️
`;

document.getElementById("btn").innerHTML="Sayang Duluu 🤗";

document.getElementById("btn").onclick=step3;

loveRain();

}

function step3(){

document.getElementById("judul").innerHTML="🥰";

document.getElementById("isi").innerHTML=`
Makase neh So Klik Cantik.<br><br>

Semoga Sela Senang Biar Cuma Halaman Sederhana. ❤️<br><br>

Kt Senang Ada Baku Dapa Dengan Ngana Meiselaa Ratu Elisabeth Hantung...

<b>Kita Senang Kenal Pa Selaa.</b>
`;

document.getElementById("btn").innerHTML="❤️ Selesai ❤️";

document.getElementById("btn").disabled=true;

loveRain();

}

function loveRain(){

for(let i=0;i<40;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(2+Math.random()*3)+"s";

heart.style.fontSize=(20+Math.random()*20)+"px";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},5000);

}

}

</script>

</body>
</html>
