<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Untuk Meichelia ❤️</title>

<style>

body{

margin:0;
height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#ff9ec4,#ffc1da,#ffd6e7);

font-family:Arial,sans-serif;

overflow:hidden;

}

.card{

background:white;

padding:40px;

border-radius:25px;

text-align:center;

box-shadow:0 10px 30px rgba(0,0,0,.2);

width:350px;

}

h1{

color:#ff3b7a;

}

button{

margin-top:20px;

padding:15px 35px;

border:none;

border-radius:50px;

background:#ff3b7a;

color:white;

font-size:18px;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.08);

}

#pesan{

margin-top:25px;

font-size:18px;

color:#444;

line-height:1.8;

}

.heart{

position:absolute;

font-size:25px;

animation:jatuh 4s linear forwards;

}

@keyframes jatuh{

0%{

transform:translateY(-50px);

opacity:1;

}

100%{

transform:translateY(110vh);

opacity:0;

}

}

</style>

</head>

<body>

<div class="card">

<h1>❤️ Hai Meichelia ❤️</h1>

<p>Kita Ada Pesan ...</p>

<button onclick="mulai()">

klik disini sayaang ❤️

</button>

<div id="pesan"></div>

</div>

<script>

function mulai(){

document.getElementById("pesan").innerHTML=`

<p>

Hai Meichelia 🌸<br><br>

semangat terus nehh sayang .<br>

jangan kuat ovt kalo ada apa2 cerita langsung nehh😊.<br><br>

🤗 Sayang Selaa ❤️

</p>

`;

for(let i=0;i<40;i++){

let h=document.createElement("div");

h.innerHTML="❤️";

h.className="heart";

h.style.left=Math.random()*100+"vw";

h.style.animationDuration=(2+Math.random()*3)+"s";

document.body.appendChild(h);

setTimeout(()=>{

h.remove();

},5000);

}

}

</script>

</body>
</html>
